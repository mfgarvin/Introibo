plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Build number derived from git commit count. Auto-increments with every
// commit; semver (versionName) stays manually controlled in pubspec.yaml.
// Falls back to flutter.versionCode when git isn't available (e.g. shallow
// CI checkouts or unpacked source tarballs).
def gitBuildNumber = {
    try {
        def stdout = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'rev-list', '--count', 'HEAD'
            standardOutput = stdout
            ignoreExitValue = true
        }
        def s = stdout.toString().trim()
        return s.isInteger() ? s.toInteger() : null
    } catch (Exception e) {
        return null
    }
}()

android {
    namespace = "com.example.introibo"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.introibo"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // minSdk = flutter.minSdkVersion
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        // minSdkVersion 21
        // targetSdkVersion 35
        // targetSdk = flutter.targetSdkVersion
        versionCode = gitBuildNumber ?: flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
